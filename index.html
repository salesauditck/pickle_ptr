<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>PTR Intelligence Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", sans-serif;
        }

        body {
            background:
                linear-gradient(135deg, #eef4ff 0%, #f8fbff 100%);
            padding: 24px;
            color: #0f172a;
        }

        .hero {
            background:
                linear-gradient(135deg, #0f172a 0%, #1d4ed8 55%, #2563eb 100%);
            border-radius: 34px;
            padding: 42px;
            margin-bottom: 24px;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 25px 60px rgba(37, 99, 235, 0.28);
        }

        .hero::before {
            content: "";
            width: 420px;
            height: 420px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            position: absolute;
            right: -100px;
            top: -120px;
        }

        .hero h1 {
            font-size: 46px;
            font-weight: 800;
            margin-bottom: 10px;
            position: relative;
            z-index: 2;
        }

        .hero p {
            position: relative;
            z-index: 2;
            opacity: 0.95;
            font-size: 16px;
        }

        /* KPI */

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
            margin-bottom: 24px;
        }

        .kpi-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 24px;
            box-shadow:
                0 12px 30px rgba(0, 0, 0, 0.06);
        }

        .kpi-title {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .kpi-value {
            font-size: 40px;
            font-weight: 800;
        }

        .kpi-sub {
            margin-top: 8px;
            color: #16a34a;
            font-size: 13px;
        }

        /* FILTERS */

        .filter-section {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 30px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow:
                0 12px 30px rgba(0, 0, 0, 0.06);
        }

        .filter-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 24px;
        }

        .filter-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 14px;
            color: #1d4ed8;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 320px;
            overflow-y: auto;
        }

        .filter-btn {
            border: none;
            padding: 12px 16px;
            border-radius: 16px;
            background: #e2e8f0;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            text-align: left;
        }

        .filter-btn:hover {
            transform: translateX(5px);
        }

        .filter-btn.active {
            background:
                linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            box-shadow:
                0 10px 20px rgba(37, 99, 235, 0.25);
        }

        /* CHARTS */

        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 22px;
            margin-bottom: 24px;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 30px;
            padding: 24px;
            height: 420px;
            box-shadow:
                0 12px 30px rgba(0, 0, 0, 0.06);
        }

        .chart-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 18px;
            color: #1d4ed8;
        }

        /* ANALYSIS */

        .analysis {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 30px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow:
                0 12px 30px rgba(0, 0, 0, 0.06);
        }

        .analysis h2 {
            margin-bottom: 18px;
            color: #1d4ed8;
        }

        .analysis-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .analysis-card {
            background:
                linear-gradient(135deg, #f8fbff, #eef4ff);
            border-radius: 22px;
            padding: 20px;
            line-height: 1.8;
            border: 1px solid #dbeafe;
        }

        /* ENTRY CARDS */

        .entry-section {
            margin-top: 24px;
        }

        .entry-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
            color: #1d4ed8;
        }

        .entry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 24px;
        }

        .entry-card {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow:
                0 14px 34px rgba(0, 0, 0, 0.08);
            transition: 0.35s;
        }

        .entry-card:hover {
            transform: translateY(-8px);
        }

        .entry-image {
            width: 100%;
            height: 320px;
            object-fit: cover;
        }

        .entry-content {
            padding: 22px;
        }

        .entry-content h3 {
            font-size: 22px;
            margin-bottom: 14px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .info-label {
            color: #64748b;
            font-weight: 600;
        }

        .info-value {
            font-weight: 700;
        }

        .ptr-badge {
            margin-top: 16px;
            display: inline-block;
            padding: 12px 18px;
            border-radius: 999px;
            background:
                linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            font-weight: 700;
            font-size: 14px;
        }

        @media(max-width:1100px) {

            .chart-grid,
            .analysis-grid,
            .filter-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

</head>

<body>

    <!-- HERO -->

    <div class="hero">

        <h1>PTR Intelligence Dashboard</h1>

        <p>
            Retail Audit Analytics • SKU Insights • Outlet Intelligence
        </p>

    </div>

    <!-- KPI -->

    <div class="kpi-grid">

        <div class="kpi-card">
            <div class="kpi-title">Total Entries</div>
            <div class="kpi-value" id="totalAudits">0</div>
            <div class="kpi-sub">Retail Records</div>
        </div>

        <div class="kpi-card">
            <div class="kpi-title">Average PTR</div>
            <div class="kpi-value" id="avgPTR">0</div>
            <div class="kpi-sub">Across All Outlets</div>
        </div>

        <div class="kpi-card">
            <div class="kpi-title">Highest PTR</div>
            <div class="kpi-value" id="highestPTR">0</div>
            <div class="kpi-sub">Peak SKU Value</div>
        </div>

    </div>

</body>

</html>
